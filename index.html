<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>西部对决 - 联机版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#1a0a0a,#2d1010,#1a0a0a);min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;color:#f0e6d3;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);overflow-x:hidden}
.gc{width:100%;max-width:920px;padding:20px;background:rgba(40,20,15,.85);border-radius:24px;border:2px solid #8b4513;box-shadow:0 20px 60px rgba(0,0,0,.8);backdrop-filter:blur(8px);position:relative}
.scr{display:none}.scr.on{display:block}
.setup{padding:30px 16px;text-align:center;max-width:540px;margin:0 auto}
.setup h1{font-size:2.2em;color:#ff6b35;text-shadow:0 0 20px rgba(255,107,53,.3)}
.setup .sub{font-size:.7em;color:#8a6a50;letter-spacing:4px}
.setup .desc{font-size:.85em;color:#a08070;margin-bottom:20px}
.mtabs{display:flex;justify-content:center;gap:8px;margin-bottom:18px}
.mtab{padding:8px 22px;border-radius:20px;border:2px solid rgba(139,69,19,.4);background:rgba(30,15,10,.5);color:#a08070;cursor:pointer;font-size:.85em}
.mtab.on{background:rgba(255,107,53,.15);border-color:#ff6b35;color:#ff6b35;font-weight:bold}
.sgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;max-width:460px;margin:0 auto 16px}
.sgrid label{font-size:.8em;color:#c0a090;display:block}
.sgrid input{background:rgba(60,30,20,.6);border:1px solid #6b3a2a;border-radius:8px;padding:9px 12px;color:#f0e6d3;font-size:.95em;width:100%;outline:none}
.sgrid input:focus{border-color:#ff6b35}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px auto;max-width:460px;text-align:left}
.settings-grid label{font-size:.78em;color:#c0a090;display:flex;align-items:center;gap:6px}
.settings-grid input[type=number]{background:rgba(60,30,20,.6);border:1px solid #6b3a2a;border-radius:6px;padding:4px 8px;color:#f0e6d3;font-size:.85em;width:55px;text-align:center;outline:none}
.settings-grid input[type=number]:focus{border-color:#ff6b35}
.settings-grid input[type=checkbox]{width:18px;height:18px;accent-color:#ff6b35}
.btn-start{background:linear-gradient(135deg,#ff6b35,#d4451a);border:none;border-radius:12px;padding:12px 44px;font-size:1.1em;font-weight:bold;color:#fff;cursor:pointer;margin-top:16px;box-shadow:0 6px 20px rgba(255,107,53,.3)}
.btn-start:hover{transform:translateY(-2px)}
.footer{font-size:.7em;color:#5a4030;margin-top:14px}
.footer a{color:#6a5540;cursor:pointer;text-decoration:underline}
.item-select{padding:20px 16px;text-align:center;max-width:520px;margin:0 auto}
.item-select h2{font-size:1.3em;color:#ff6b35}
.item-select .hint{font-size:.8em;color:#a08070;margin-bottom:16px}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;margin:0 auto}
.item-card{background:rgba(30,15,10,.6);border:2px solid rgba(139,69,19,.3);border-radius:12px;padding:10px 12px;cursor:pointer;text-align:left;position:relative}
.item-card.sel{border-color:#ff6b35;background:rgba(255,107,53,.08)}
.item-card .iemoji{font-size:1.5em}
.item-card .iname{font-size:.85em;font-weight:bold;color:#f0e6d3}
.item-card .idesc{font-size:.65em;color:#8a7a60;line-height:1.4}
.item-card .icheck{position:absolute;top:6px;right:8px;color:#44cc66;display:none}
.item-card.sel .icheck{display:block}
.item-confirm{background:linear-gradient(135deg,#ff6b35,#d4451a);border:none;border-radius:10px;padding:10px 36px;font-size:1em;font-weight:bold;color:#fff;cursor:pointer;margin-top:16px}
.item-confirm:disabled{opacity:.3;cursor:not-allowed}
.p2p-screen{text-align:center;padding:30px 16px}
.p2p-screen h2{font-size:1.3em;color:#ff6b35}
.p2p-steps{font-size:.85em;color:#c0a090;margin-bottom:16px;line-height:1.8}
.p2p-qr{background:#fff;padding:16px;border-radius:12px;display:inline-block;margin:8px 0}
.p2p-qr canvas{display:block;margin:0 auto}
.p2p-code{font-size:.7em;color:#6a5540;word-break:break-all;margin:8px auto;max-width:300px;background:rgba(0,0,0,.3);padding:8px 12px;border-radius:8px}
.p2p-scan-btn{background:rgba(255,107,53,.15);border:1px solid #ff6b35;border-radius:10px;padding:10px 28px;color:#ff6b35;cursor:pointer;font-size:.9em;margin:8px 4px}
.p2p-status{font-size:.85em;color:#44aadd;margin-top:8px}
.p2p-video{max-width:300px;width:100%;border-radius:12px;margin:8px auto;display:block}
.p2p-error{color:#ff4444;font-size:.8em;margin-top:8px;padding:8px;background:rgba(255,68,68,.1);border-radius:6px}
.p2p-loading{color:#ffaa00;font-size:.8em;margin-top:8px}
.p2p-retry{background:rgba(255,170,0,.15);border:1px solid #ffaa00;border-radius:8px;padding:8px 20px;color:#ffaa00;cursor:pointer;font-size:.8em;margin:8px auto;display:inline-block}
.p2p-info{background:rgba(68,204,102,.15);border:1px solid #44cc66;border-radius:8px;padding:8px 16px;color:#44cc66;cursor:pointer;font-size:.8em;margin:8px auto;display:inline-block}
.game-screen{display:none;text-align:center;padding:20px}
.game-screen.on{display:block}
.game-arena{background:rgba(20,10,8,.8);border-radius:16px;padding:20px;margin:16px 0;min-height:300px}
.player-info{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.player-card{background:rgba(30,15,10,.6);border:2px solid rgba(139,69,19,.3);border-radius:12px;padding:15px}
.player-card.host{border-color:#ff6b35;background:rgba(255,107,53,.08)}
.player-card.current{border-color:#44cc66;background:rgba(68,204,102,.08)}
.player-name{font-size:1.1em;font-weight:bold;color:#f0e6d3;margin-bottom:8px}
.player-hp{font-size:.9em;color:#ff6b35}
.player-status{font-size:.75em;color:#8a7a60;margin-top:4px}
.game-log{background:rgba(0,0,0,.4);border-radius:8px;padding:15px;max-height:200px;overflow-y:auto;text-align:left}
.game-log-entry{font-size:.85em;color:#c0a090;margin-bottom:6px;line-height:1.4}
.game-log-entry.da{color:#ff6b35}
.game-log-entry.cr{color:#ff4444}
.game-log-item{color:#44cc66}
.game-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.game-btn{background:linear-gradient(135deg,#ff6b35,#d4451a);border:none;border-radius:10px;padding:12px 20px;font-size:1em;font-weight:bold;color:#fff;cursor:pointer;box-shadow:0 4px 15px rgba(255,107,53,.3)}
.game-btn:hover{transform:translateY(-2px)}
.game-btn:disabled{opacity:.5;cursor:not-allowed}
.game-btn.secondary{background:linear-gradient(135deg,#666,#444);color:#ccc}
.connection-status{position:fixed;top:12px;right:12px;background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:20px;font-size:.8em;z-index:1000}
.connection-status.connected{background:rgba(68,204,102,.8);color:#fff}
.connection-status.connecting{background:rgba(255,170,0,.8);color:#fff}
.connection-status.error{background:rgba(255,68,68,.8);color:#fff}
@media (max-width:768px){
  .gc{padding:16px}
  .setup h1{font-size:1.8em}
  .player-info{grid-template-columns:1fr;gap:10px}
  .game-controls{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="connection-status" id="connectionStatus">离线</div>

<div class="gc">
    <!-- 设置界面 -->
    <div class="scr setup on" id="setupScreen">
        <h1>🤠 西部对决</h1>
        <div class="sub">WESTERN SHOWDOWN</div>
        <div class="desc">经典西部决斗游戏，测试你的运气与策略</div>
        
        <div class="mtabs">
            <div class="mtab on" data-m="local" onclick="setMode('local')">本地</div>
            <div class="mtab" data-m="p2p" onclick="setMode('p2p')">联机</div>
            <div class="mtab" data-m="ai" onclick="setMode('ai')">AI</div>
        </div>
        
        <div class="sgrid">
            <label>玩家1名称</label>
            <div></div>
            <label>玩家2名称</label>
        </div>
        <div class="sgrid">
            <input type="text" id="p1Name" value="玩家1" maxlength="8">
            <div></div>
            <input type="text" id="p2Name" value="玩家2" maxlength="8">
        </div>
        
        <div class="settings-grid">
            <label><input type="checkbox" id="soundOn" checked> 音效</label>
            <label><input type="checkbox" id="autoStart" checked> 自动开始</label>
            <label><input type="checkbox" id="showHints"> 显示提示</label>
            <label><input type="checkbox" id="enableItems" checked> 启用道具</label>
        </div>
        
        <div class="settings-grid">
            <label>回合限制</label>
            <input type="number" id="roundLimit" value="20" min="5" max="50">
            <label>起始HP</label>
            <input type="number" id="startHP" value="6" min="3" max="10">
        </div>
        
        <button class="btn-start" onclick="startGame()">开始游戏</button>
        
        <div class="footer">
            <a onclick="showHelp()">游戏帮助</a> | 
            <a onclick="showSettings()">高级设置</a>
        </div>
    </div>

    <!-- 物品选择界面 -->
    <div class="scr item-select" id="itemScreen">
        <h2>选择道具</h2>
        <div class="hint">每位玩家选择3个道具带入游戏</div>
        <div class="item-grid" id="itemGrid"></div>
        <button class="item-confirm" id="itemConfirm" onclick="confirmItems()" disabled>确认选择</button>
    </div>

    <!-- P2P联机界面 -->
    <div class="scr p2p-screen" id="p2pScreen">
        <h2 id="p2pTitle">联机对战</h2>
        <div class="p2p-steps" id="p2pSteps">选择创建或加入房间</div>
        <div id="p2pQrArea"></div>
        <div class="p2p-code" id="p2pCode"></div>
        <div id="p2pError" class="p2p-error" style="display:none"></div>
        <div id="p2pLoading" class="p2p-loading" style="display:none">正在连接...</div>
        <div><button class="p2p-scan-btn" id="p2pScanBtn" style="display:none">扫描</button></div>
        <div class="p2p-status" id="p2pStatus"></div>
        <video class="p2p-video" id="p2pVideo" autoplay playsinline style="display:none"></video>
        <div id="p2pActions"></div>
        <div id="p2pRetry" class="p2p-retry" style="display:none" onclick="retryConnection()">重试连接</div>
        <div id="p2pInfo" class="p2p-info" style="display:none" onclick="showConnectionInfo()">连接信息</div>
    </div>

    <!-- 游戏界面 -->
    <div class="scr game-screen" id="gameScreen">
        <div class="game-arena">
            <div class="player-info">
                <div class="player-card host" id="player1Card">
                    <div class="player-name" id="player1Name">玩家1</div>
                    <div class="player-hp" id="player1HP">❤️❤️❤️❤️❤️❤️ (6/6)</div>
                    <div class="player-status" id="player1Status">等待中...</div>
                </div>
                <div class="player-card current" id="player2Card">
                    <div class="player-name" id="player2Name">玩家2</div>
                    <div class="player-hp" id="player2HP">❤️❤️❤️❤️❤️❤️ (6/6)</div>
                    <div class="player-status" id="player2Status">等待中...</div>
                </div>
            </div>
            <div class="game-log" id="gameLog"></div>
            <div class="game-controls">
                <button class="game-btn" id="shootBtn" onclick="action('shoot')" disabled>开枪</button>
                <button class="game-btn secondary" id="skipBtn" onclick="action('skip')" disabled>跳过</button>
                <button class="game-btn secondary" id="itemBtn" onclick="showItemMenu()" disabled>使用道具</button>
                <button class="game-btn secondary" id="quitBtn" onclick="quitGame()">退出游戏</button>
            </div>
        </div>
    </div>
</div>

<script>
// ====== 全局状态 ======
var G={
    mode:null, // local, p2p, ai
    p:[null,null],
    hp:[6,6],
    cp:0, // current player
    ps:[[],[]], // selected items
    ld:0, // loaded items count
    phase:'setup', // setup, ready, playing, ended
    rd:0, // round
    isHost:false,
    conn:null,
    connStep:0,
    freezeTarget:undefined,
    extraBullets:[],
    aiDiff:'medium',
    aiCustom:{caut:50, item:50, acc:50, bluf:30}
};

// ====== P2P联机核心功能 ======
var pc = null, dc = null, p2pStep = 0, scanInt = null;
var connectionRetries = 0;
const MAX_RETRIES = 3;
const CONNECTION_TIMEOUT = 30000;

// 初始化P2P连接
function initP2P() {
    try {
        // 检查WebRTC支持
        if (!window.RTCPeerConnection || !window.RTCDataChannel) {
            showError('浏览器不支持WebRTC，请使用Chrome、Firefox或Safari');
            return false;
        }
        
        // 创建PeerConnection
        pc = new RTCPeerConnection({
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        });
        
        // 创建数据通道
        dc = pc.createDataChannel('game-data', {
            ordered: true,
            maxRetransmits: 3
        });
        
        setupDataChannelHandlers();
        setupICEHandlers();
        
        return true;
    } catch (error) {
        showError('P2P初始化失败: ' + error.message);
        return false;
    }
}

// 设置数据通道处理器
function setupDataChannelHandlers() {
    dc.onopen = function() {
        console.log('数据通道已打开');
        updateConnectionStatus('connected', '已连接');
        connectionRetries = 0;
    };
    
    dc.onmessage = function(event) {
        try {
            var data = JSON.parse(event.data);
            handleP2PMessage(data);
        } catch (error) {
            console.error('解析消息失败:', error);
        }
    };
    
    dc.onclose = function() {
        console.log('数据通道已关闭');
        updateConnectionStatus('disconnected', '连接断开');
        handleConnectionLoss();
    };
    
    dc.onerror = function(error) {
        console.error('数据通道错误:', error);
        showError('数据通道错误: ' + error.message);
    };
}

// 设置ICE处理器
function setupICEHandlers() {
    pc.oniceconnectionstatechange = function() {
        console.log('ICE连接状态:', pc.iceConnectionState);
        
        switch (pc.iceConnectionState) {
            case 'checking':
                updateConnectionStatus('connecting', '正在连接...');
                break;
            case 'connected':
            case 'completed':
                updateConnectionStatus('connected', '已连接');
                break;
            case 'disconnected':
            case 'failed':
                updateConnectionStatus('error', '连接失败');
                handleConnectionLoss();
                break;
            case 'closed':
                updateConnectionStatus('disconnected', '连接已关闭');
                break;
        }
    };
    
    pc.onicecandidate = function(event) {
        if (event.candidate) {
            console.log('ICE候选:', event.candidate);
        } else {
            console.log('ICE收集完成');
        }
    };
}

// 处理P2P消息
function handleP2PMessage(data) {
    console.log('收到P2P消息:', data);
    
    switch (data.type) {
        case 'offer':
            handleOffer(data.offer);
            break;
        case 'answer':
            handleAnswer(data.answer);
            break;
        case 'candidate':
            handleICECandidate(data.candidate);
            break;
        case 'game-state':
            handleGameState(data);
            break;
        case 'action':
            handleOpponentAction(data.action);
            break;
        case 'error':
            showError('对手错误: ' + data.message);
            break;
        case 'ping':
            sendAction({ type: 'pong' });
            break;
    }
}

// 创建房间（主机）
function hostP2P() {
    if (!initP2P()) return;
    
    p2pStep = 1;
    $('p2pSteps').textContent = '正在创建房间...';
    $('p2pStatus').textContent = '生成连接代码...';
    
    // 生成房间ID
    G.roomId = generateRoomId();
    
    // 创建offer
    pc.createOffer()
        .then(function(offer) {
            return pc.setLocalDescription(offer);
        })
        .then(function() {
            // 生成二维码和显示连接信息
            showConnectionInfo();
            $('p2pSteps').textContent = '等待对手加入...';
            $('p2pStatus').textContent = '房间ID: ' + G.roomId;
            startConnectionTimeout();
        })
        .catch(function(error) {
            showError('创建offer失败: ' + error.message);
        });
}

// 加入房间（客户端）
function joinP2P() {
    showConnectionMethods();
}

// 显示连接方式
function showConnectionMethods() {
    $('p2pSteps').textContent = '选择连接方式';
    $('p2pQrArea').innerHTML = '';
    $('p2pCode').textContent = '';
    
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = '输入房间ID或扫描二维码';
    inp.style.cssText = 'width:100%;padding:10px;border-radius:8px;border:1px solid #6b3a2a;background:rgba(60,30,20,.6);color:#f0e6d3;margin-bottom:10px';
    
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;justify-content:center';
    
    var btn1 = document.createElement('button');
    btn1.className = 'p2p-scan-btn';
    btn1.textContent = '确认';
    btn1.onclick = function() {
        var v = document.getElementById('p2pTextInput');
        if (v && v.value.trim()) {
            G.roomId = v.value.trim().toUpperCase();
            connectToRoom();
        }
    };
    
    var btn2 = document.createElement('button');
    btn2.className = 'p2p-scan-btn';
    btn2.textContent = '从相册选择截图';
    btn2.onclick = function() {
        if (!p2pFileInput) addGalleryInput();
        var fi = document.getElementById('p2pGalleryInput');
        if (fi) fi.click();
    };
    
    row.appendChild(btn1);
    row.appendChild(btn2);
    
    $('p2pQrArea').appendChild(inp);
    $('p2pQrArea').appendChild(row);
    
    // 设置输入框ID
    inp.id = 'p2pTextInput';
    inp.focus();
}

// 连接到房间
function connectToRoom() {
    if (!initP2P()) return;
    
    p2pStep = 2;
    $('p2pSteps').textContent = '正在连接到房间...';
    $('p2pStatus').textContent = '房间ID: ' + G.roomId;
    showConnectionInfo();
    startConnectionTimeout();
    
    // 创建answer
    pc.createOffer()
        .then(function(offer) {
            return pc.setLocalDescription(offer);
        })
        .then(function() {
            // 发送offer给主机
            sendToServer({
                type: 'join',
                roomId: G.roomId,
                offer: pc.localDescription
            });
        })
        .catch(function(error) {
            showError('创建offer失败: ' + error.message);
        });
}

// 处理offer
function handleOffer(offer) {
    if (!pc) return;
    
    pc.setRemoteDescription(new RTCSessionDescription(offer))
        .then(function() {
            return pc.createAnswer();
        })
        .then(function(answer) {
            return pc.setLocalDescription(answer);
        })
        .then(function() {
            sendToServer({
                type: 'answer',
                roomId: G.roomId,
                answer: pc.localDescription
            });
        })
        .catch(function(error) {
            showError('处理offer失败: ' + error.message);
        });
}

// 处理answer
function handleAnswer(answer) {
    if (!pc) return;
    
    pc.setRemoteDescription(new RTCSessionDescription(answer))
        .then(function() {
            console.log('Answer处理完成');
            onConnectionEstablished();
        })
        .catch(function(error) {
            showError('处理answer失败: ' + error.message);
        });
}

// 处理ICE候选
function handleICECandidate(candidate) {
    if (!pc) return;
    
    pc.addIceCandidate(new RTCIceCandidate(candidate))
        .catch(function(error) {
            console.error('添加ICE候选失败:', error);
        });
}

// 连接建立成功
function onConnectionEstablished() {
    console.log('P2P连接建立成功');
    G.isHost = p2pStep === 1;
    G.mode = 'p2p';
    
    $('p2pSteps').textContent = '连接成功！';
    $('p2pStatus').textContent = G.isHost ? '你是主机' : '你是客户端';
    $('p2pQrArea').innerHTML = '';
    $('p2pCode').textContent = '';
    $('p2pScanBtn').style.display = 'none';
    $('p2pRetry').style.display = 'none';
    
    // 开始游戏
    setTimeout(function() {
        startGame();
    }, 1000);
}

// 发送动作到对手
function sendAction(action) {
    if (!dc || dc.readyState !== 'open') {
        console.warn('数据通道未打开，无法发送动作');
        return false;
    }
    
    try {
        dc.send(JSON.stringify({
            type: 'action',
            action: action,
            timestamp: Date.now()
        }));
        return true;
    } catch (error) {
        console.error('发送动作失败:', error);
        return false;
    }
}

// 发送游戏状态
function sendState() {
    if (!dc || dc.readyState !== 'open') return;
    
    try {
        dc.send(JSON.stringify({
            type: 'game-state',
            state: {
                hp: G.hp,
                cp: G.cp,
                rd: G.rd,
                ps: G.ps,
                ld: G.ld
            },
            timestamp: Date.now()
        }));
    } catch (error) {
        console.error('发送游戏状态失败:', error);
    }
}

// 处理对手动作
function handleOpponentAction(action) {
    console.log('对手动作:', action);
    
    switch (action.type) {
        case 'shoot':
            if (action.hit) {
                // 对手击中
                var dmg = action.dmg || 1;
                G.hp[G.cp] -= dmg;
                addL('对手开枪: 击中! 造成' + dmg + '点伤害', 'da');
                if (G.hp[G.cp] <= 0) {
                    gameOver(G.cp === 0 ? 1 : 0);
                }
            } else {
                // 对手空枪
                addL('对手开枪: 空枪', '');
                G.cc = action.cc;
                G.cp = action.cp;
            }
            break;
            
        case 'skip':
            G.cp = action.cp;
            addL('对手跳过回合', '');
            break;
            
        case 'item':
            var names = {};
            ITEMS.forEach(function(it) { names[it.id] = it.name; });
            addL('对手使用了 ' + names[action.id], 'in');
            break;
            
        case 'load':
            G.ps[action.cp] = action.ps;
            G.ld = action.ld;
            break;
    }
    
    updateGameDisplay();
    enableActions();
}

// 处理游戏状态
function handleGameState(state) {
    console.log('收到游戏状态:', state);
    G.hp = state.hp;
    G.cp = state.cp;
    G.rd = state.rd;
    G.ps = state.ps;
    G.ld = state.ld;
    
    updateGameDisplay();
}

// 连接超时处理
function startConnectionTimeout() {
    clearTimeout(scanInt);
    scanInt = setTimeout(function() {
        if (p2pStep > 0 && p2pStep < 3) {
            connectionRetries++;
            if (connectionRetries >= MAX_RETRIES) {
                showError('连接超时，请检查网络后重试');
                $('p2pRetry').style.display = 'inline-block';
            } else {
                showError('连接超时，正在重试... (' + connectionRetries + '/' + MAX_RETRIES + ')');
                setTimeout(function() {
                    if (p2pStep === 1) {
                        hostP2P();
                    } else if (p2pStep === 2) {
                        connectToRoom();
                    }
                }, 2000);
            }
        }
    }, CONNECTION_TIMEOUT);
}

// 连接丢失处理
function handleConnectionLoss() {
    if (G.phase === 'playing') {
        showError('与对手的连接丢失');
        // 可以选择暂停游戏或等待重连
    }
}

// 重试连接
function retryConnection() {
    connectionRetries = 0;
    $('p2pRetry').style.display = 'none';
    $('p2pError').style.display = 'none';
    
    if (p2pStep === 1) {
        hostP2P();
    } else if (p2pStep === 2) {
        showConnectionMethods();
    }
}

// 显示连接信息
function showConnectionInfo() {
    if (!G.roomId) {
        G.roomId = generateRoomId();
    }
    
    // 生成二维码
    var qrData = 'ws://localhost:3000/join/' + G.roomId;
    var qrCanvas = generateQRCode(qrData, 200);
    
    var wrap = document.createElement('div');
    wrap.className = 'p2p-qr';
    wrap.appendChild(qrCanvas);
    
    $('p2pQrArea').innerHTML = '';
    $('p2pQrArea').appendChild(wrap);
    
    $('p2pCode').textContent = G.roomId;
    $('p2pInfo').style.display = 'inline-block';
}

// 生成房间ID
function generateRoomId() {
    return Math.random().toString(36).substr(2, 6).toUpperCase();
}

// 生成二维码
function generateQRCode(text, size) {
    var canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    
    // 这里简化处理，实际应该使用QRCode库
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText(text, 5, size - 5);
    
    return canvas;
}

// 更新连接状态
function updateConnectionStatus(status, text) {
    var statusEl = $('connectionStatus');
    statusEl.textContent = text;
    statusEl.className = 'connection-status ' + status;
}

// 显示错误信息
function showError(message) {
    var errorEl = $('p2pError');
    errorEl.textContent = message;
    errorEl.style.display = 'block';
    $('p2pLoading').style.display = 'none';
}

// ====== 游戏核心逻辑 ======
function startGame() {
    // 初始化游戏状态
    G.hp = [parseInt($('startHP').value), parseInt($('startHP').value)];
    G.cp = 0;
    G.rd = 0;
    G.phase = 'playing';
    
    // 设置玩家名称
    G.p[0] = { n: $('p1Name').value || '玩家1' };
    G.p[1] = { n: $('p2Name').value || '玩家2' };
    
    // 切换到游戏界面
    showScreen('gameScreen');
    
    // 更新显示
    updateGameDisplay();
    enableActions();
    
    // 添加游戏开始日志
    addL('游戏开始! ' + G.p[0].n + ' vs ' + G.p[1].n, 'start');
    
    // 如果是P2P模式且是客户端，等待主机开始
    if (G.mode === 'p2p' && !G.isHost) {
        $('player1Status').textContent = '等待主机开始...';
        $('player2Status').textContent = '准备就绪';
        disableActions();
    }
}

// 更新游戏显示
function updateGameDisplay() {
    // 更新玩家信息
    $('player1Name').textContent = G.p[0].n;
    $('player2Name').textContent = G.p[1].n;
    
    // 更新HP显示
    updateHPDisplay(0);
    updateHPDisplay(1);
    
    // 更新状态
    if (G.phase === 'playing') {
        var currentPlayerName = G.p[G.cp].n;
        $('player1Status').textContent = G.cp === 0 ? '你的回合' : '等待中...';
        $('player2Status').textContent = G.cp === 1 ? '你的回合' : '等待中...';
        
        // 高亮当前玩家
        document.getElementById('player1Card').classList.toggle('current', G.cp === 0);
        document.getElementById('player2Card').classList.toggle('current', G.cp === 1);
    }
}

// 更新HP显示
function updateHPDisplay(player) {
    var hpEl = $('player' + (player + 1) + 'HP');
    var hp = G.hp[player];
    var maxHP = parseInt($('startHP').value);
    var hearts = '❤️'.repeat(Math.max(0, hp));
    var grayHearts = '🤍'.repeat(Math.max(0, maxHP - hp));
    hpEl.textContent = hearts + grayHearts + ' (' + hp + '/' + maxHP + ')';
}

// 启用/禁用动作按钮
function enableActions() {
    if (G.mode === 'p2p' && !G.isHost && G.cp === 0) {
        disableActions();
        return;
    }
    
    if (G.phase === 'playing' && G.cp === getCurrentPlayer()) {
        $('shootBtn').disabled = false;
        $('skipBtn').disabled = false;
        $('itemBtn').disabled = false;
    } else {
        disableActions();
    }
}

function disableActions() {
    $('shootBtn').disabled = true;
    $('skipBtn').disabled = true;
    $('itemBtn').disabled = true;
}

// 获取当前玩家
function getCurrentPlayer() {
    if (G.mode === 'p2p') {
        return G.isHost ? 0 : 1;
    }
    return G.cp;
}

// 玩家动作
function action(type) {
    if (G.phase !== 'playing') return;
    
    var currentPlayer = getCurrentPlayer();
    if (currentPlayer !== G.cp) return;
    
    switch (type) {
        case 'shoot':
            shoot();
            break;
        case 'skip':
            skip();
            break;
    }
}

// 开枪
function shoot() {
    var hit = Math.random() < 0.7; // 70%命中率
    var dmg = hit ? 1 : 0;
    
    if (G.mode === 'p2p') {
        sendAction({ type: 'shoot', hit: hit, dmg: dmg, dt: Date.now() });
        if (hit) {
            G.hp[G.cp === 0 ? 1 : 0] -= dmg;
            addL('你开枪: 击中! 造成' + dmg + '点伤害', 'da');
        } else {
            addL('你开枪: 空枪', '');
        }
    } else {
        // 本地游戏逻辑
        if (hit) {
            G.hp[G.cp === 0 ? 1 : 0] -= dmg;
            addL('玩家' + (G.cp + 1) + '开枪: 击中! 造成' + dmg + '点伤害', 'da');
        } else {
            addL('玩家' + (G.cp + 1) + '开枪: 空枪', '');
        }
    }
    
    G.rd++;
    updateGameDisplay();
    
    if (G.hp[0] <= 0 || G.hp[1] <= 0) {
        gameOver(G.hp[0] <= 0 ? 1 : 0);
    } else {
        nextTurn();
    }
}

// 跳过回合
function skip() {
    if (G.mode === 'p2p') {
        sendAction({ type: 'skip', cp: G.cp });
        addL('你跳过了回合', '');
    } else {
        addL('玩家' + (G.cp + 1) + '跳过了回合', '');
    }
    
    nextTurn();
}

// 下一回合
function nextTurn() {
    G.cp = 1 - G.cp;
    updateGameDisplay();
    enableActions();
}

// 游戏结束
function gameOver(winner) {
    G.phase = 'ended';
    var winnerName = G.p[winner].n;
    addL('游戏结束! ' + winnerName + ' 获胜!', 'end');
    
    disableActions();
    
    // 显示重新开始按钮
    setTimeout(function() {
        if (confirm(winnerName + ' 获胜! 是否重新开始?')) {
            location.reload();
        }
    }, 1000);
}

// 退出游戏
function quitGame() {
    if (confirm('确定要退出游戏吗?')) {
        if (G.mode === 'p2p' && dc && dc.readyState === 'open') {
            dc.close();
            pc.close();
        }
        location.reload();
    }
}

// 添加游戏日志
function addL(text, className) {
    var log = $('gameLog');
    var entry = document.createElement('div');
    entry.className = 'game-log-entry ' + className;
    entry.textContent = text;
    log.appendChild(entry);
    log.scrollTop = log.scrollHeight;
}

// ====== UI工具函数 ======
function $(id) {
    return document.getElementById(id);
}

function showScreen(screenId) {
    document.querySelectorAll('.scr').forEach(function(el) {
        el.classList.remove('on');
    });
    $(screenId).classList.add('on');
}

function setMode(mode) {
    G.mode = mode;
    document.querySelectorAll('.mtab').forEach(function(tab) {
        tab.classList.remove('on');
    });
    document.querySelector('.mtab[data-m="' + mode + '"]').classList.add('on');
    
    if (mode === 'p2p') {
        showScreen('p2pScreen');
    } else {
        showScreen('setupScreen');
    }
}
