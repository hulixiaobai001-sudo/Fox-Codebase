<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Web Client</title>
    <style>
        :root {
            --bg-color: #121212;
            --chat-bg: #1e1e1e;
            --user-msg: #2a2a2a;
            --ai-msg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4a9eff;
            --border-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部设置栏 */
        header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--chat-bg);
        }

        header h1 { font-size: 16px; font-weight: 600; margin-right: auto; }

        input[type="password"] {
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            width: 220px;
            outline: none;
        }
        input[type="password"]:focus { border-color: var(--accent-color); }

        button.save-btn {
            background: var(--accent-color);
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--ai-msg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            background: var(--chat-bg);
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 150px;
            font-family: inherit;
        }
        textarea:focus { border-color: var(--accent-color); }

        button.send-btn {
            background: var(--accent-color);
            border: none;
            color: #fff;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        button.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status { font-size: 12px; color: #888; padding: 4px 20px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>🦊 DeepSeek Client</h1>
    <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key (sk-...)" />
    <button class="save-btn" onclick="saveKey()">保存</button>
</header>

<div class="chat-container" id="chatContainer">
    <div class="message ai">你好！我是 DeepSeek，请输入你的 API Key 后开始对话。</div>
</div>

<div class="status" id="statusText">就绪</div>

<div class="input-area">
    <textarea id="userInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
</div>

<script>
    // 初始化：从本地存储读取 Key
    const apiKeyInput = document.getElementById('apiKeyInput');
    const savedKey = localStorage.getItem('deepseek_api_key');
    if (savedKey) apiKeyInput.value = savedKey;

    function saveKey() {
        const key = apiKeyInput.value.trim();
        if (key) {
            localStorage.setItem('deepseek_api_key', key);
            alert('API Key 已保存到浏览器本地！');
        }
    }

    // 自动调整输入框高度
    const userInput = document.getElementById('userInput');
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 150) + 'px';
    });

    // Enter 发送，Shift+Enter 换行
    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 聊天记录上下文
    let chatHistory = [];

    async function sendMessage() {
        const apiKey = apiKeyInput.value.trim();
        const content = userInput.value.trim();
        
        if (!apiKey) { alert('请先在顶部输入并保存 API Key！'); return; }
        if (!content) return;

        // 显示用户消息
        appendMessage(content, 'user');
        userInput.value = '';
        userInput.style.height = 'auto';

        // 构建请求体
        chatHistory.push({ role: 'user', content: content });
        
        const sendBtn = document.getElementById('sendBtn');
        const statusText = document.getElementById('statusText');
        sendBtn.disabled = true;
        statusText.textContent = '正在思考...';

        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: chatHistory,
                    stream: false
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `请求失败: ${response.status}`);
            }

            const data = await response.json();
            const aiReply = data.choices[0].message.content;
            
            chatHistory.push({ role: 'assistant', content: aiReply });
            appendMessage(aiReply, 'ai');
            statusText.textContent = '就绪';

        } catch (error) {
            appendMessage(`⚠️ 错误: ${error.message}`, 'ai');
            statusText.textContent = '出错了';
            // 出错时移除最后一条用户消息，避免污染上下文
            chatHistory.pop();
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function appendMessage(text, role) {
        const container = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
