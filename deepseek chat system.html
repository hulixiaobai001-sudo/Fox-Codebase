<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦊 DeepSeek Chat</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --chat-bg: #1a1a1a;
            --user-msg: #2a5fff;
            --ai-msg: #2a2a2a;
            --text-color: #e0e0e0;
            --accent-color: #4a9eff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 12px 16px;
            background: var(--chat-bg);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        header h1 { font-size: 18px; font-weight: 600; }
        
        .api-input {
            flex: 1;
            min-width: 220px;
        }

        input[type="password"] {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--chat-bg);
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--ai-msg);
            border: 1px solid #333;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 16px;
            background: var(--chat-bg);
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            resize: none;
            min-height: 50px;
            max-height: 160px;
        }

        .clear-btn {
            background: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>🦊 DeepSeek Chat</h1>
        <div class="api-input">
            <input type="password" id="apiKeyInput" placeholder="输入 DeepSeek API Key (sk-...)" />
        </div>
        <button onclick="saveKey()">保存 Key</button>
        <button class="clear-btn" onclick="clearChat()">清空对话</button>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="message ai">你好！我是 DeepSeek，请输入 API Key 后开始对话～</div>
    </div>

    <div class="input-area">
        <textarea id="userInput" placeholder="输入消息... (Enter 发送)"></textarea>
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const userInput = document.getElementById('userInput');
        const chatContainer = document.getElementById('chatContainer');

        // 加载保存的 Key
        if (localStorage.getItem('deepseek_api_key')) {
            apiKeyInput.value = localStorage.getItem('deepseek_api_key');
        }

        function saveKey() {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
                alert('✅ API Key 已保存！');
            }
        }

        function clearChat() {
            if (confirm('确定要清空所有对话吗？')) {
                chatContainer.innerHTML = '<div class="message ai">对话已清空，你好！我是 DeepSeek。</div>';
            }
        }

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            const content = userInput.value.trim();
            
            if (!apiKey) return alert('请先输入并保存 API Key！');
            if (!content) return;

            appendMessage(content, 'user');
            userInput.value = '';

            const tempMsg = appendMessage('思考中...', 'ai');

            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{ role: 'user', content: content }]
                    })
                });

                const data = await res.json();
                tempMsg.remove();
                appendMessage(data.choices[0].message.content, 'ai');
            } catch (e) {
                tempMsg.textContent = `❌ 错误: ${e.message}`;
            }
        }

        function appendMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // Enter 发送
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
